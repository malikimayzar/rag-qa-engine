project:
  name: rag-qa-engine
  version: 0.1.0

paths:
  data_raw: data/raw
  data_processed: data/processed
  index_dir: data/index
  logs_dir: logs

ingestion:
  parser: pymupdf
  fallback_parser: pdfplumber
  clean_headers: true
  clean_footers: true
  rust_cleaner: false

chunking:
  strategy: semantic
  min_chunk_size: 100
  max_chunk_size: 512
  overlap: 50
  rust_engine: false

embedding:
  model: paraphrase-multilingual-MiniLM-L12-v2
  batch_size: 32
  device: cpu

retrieval:
  top_k: 5
  dense_weight: 0.6
  bm25_weight: 0.4
  rust_bm25: false

reranking:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_n: 3

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  max_tokens: 1024
  temperature: 0.1

eval:
  faithfulness: true
  relevance: true
  latency: true
